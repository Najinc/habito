services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: habito-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: habito-backend
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-habito_ads}
      SEARCH_LIMIT: ${SEARCH_LIMIT:-100}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      ALLOW_HF_ON_CPU: ${ALLOW_HF_ON_CPU:-false}
      WATCHFILES_FORCE_POLLING: "true"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      RERANKING_MODEL: ${RERANKING_MODEL:-Qwen/Qwen3-Reranker-4B}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LBC_LIMIT: ${LBC_LIMIT:-100}
      LBC_PRICE_MIN: ${LBC_PRICE_MIN:-500}
      LBC_PRICE_MAX: ${LBC_PRICE_MAX:-1500}

  frontend:
    image: node:20-alpine
    container_name: habito-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/habito-front:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  ingestion:
    build:
      context: ./ingestion
    container_name: habito-ingestion
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-habito_ads}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      ALLOW_HF_ON_CPU: ${ALLOW_HF_ON_CPU:-false}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      LBC_TEXT: ${LBC_TEXT:-appartement}
      LBC_CITY: ${LBC_CITY:-Paris}
      LBC_LAT: ${LBC_LAT:-48.8566}
      LBC_LNG: ${LBC_LNG:-2.3522}
      LBC_RADIUS: ${LBC_RADIUS:-10000}
      LBC_PAGE: ${LBC_PAGE:-1}
      LBC_LIMIT: ${LBC_LIMIT:-100}
      LBC_PRICE_MIN: ${LBC_PRICE_MIN:-500}
      LBC_PRICE_MAX: ${LBC_PRICE_MAX:-1500}
      LBC_PROGRESSIVE: ${LBC_PROGRESSIVE:-false}
      LBC_MAX_PAGES: ${LBC_MAX_PAGES:-1}
      LBC_LOCATIONS: ${LBC_LOCATIONS:-Paris:48.8566:2.3522;Lille:50.6292:3.0573;Reims:49.2583:4.0317}
    profiles:
      - tools

volumes:
  qdrant_data:
  frontend_node_modules:
